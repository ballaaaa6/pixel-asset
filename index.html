<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var div = document.createElement('div');
        div.style.color = 'red';
        div.style.background = 'white';
        div.style.padding = '20px';
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.border = '4px solid red';
        div.innerHTML = '<h3>JS Error Detected:</h3>' + message + '<br>Source: ' + source + '<br>Line: ' + lineno + ':' + colno + (error && error.stack ? '<br><pre>' + error.stack + '</pre>' : '');
        document.body.appendChild(div);
      };
      window.addEventListener('unhandledrejection', function(event) {
        var div = document.createElement('div');
        div.style.color = 'red';
        div.style.background = 'white';
        div.style.padding = '20px';
        div.style.position = 'fixed';
        div.style.bottom = '0';
        div.style.left = '0';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.border = '4px solid red';
        div.innerHTML = '<h3>Unhandled Promise Rejection:</h3>' + event.reason;
        document.body.appendChild(div);
      });
    </script>
    <!-- Viewport locked to prevent horizontal zoom and sway on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>CartoonStock Vault // Portfolio Manager</title>
    <meta name="description" content="ระบบติดตามมูลค่าพอร์ตการลงทุนแบบหลายสินทรัพย์สไตล์การ์ตูนเวกเตอร์อ่านง่าย" />
    
    <!-- Google Fonts: Outfit (Cartoon Sans-serif) + Noto Sans Thai (Thai) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body style="margin: 0; padding: 0; background-color: #0f0f1b;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
